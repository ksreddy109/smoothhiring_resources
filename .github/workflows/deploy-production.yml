name: Deploy production to S3 and CloudFront

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  S3_BUCKET: smoothhiring-resources-production
  CLOUDFRONT_DISTRIBUTION_ID: E2O2WRCWTC6KI6
  NEXT_PUBLIC_SITE_URL: https://smoothhiring.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4

      - name: Checkout smooth-ui (public)
        uses: actions/checkout@v4
        with:
          repository: KetSoftware/smooth_ui
          path: smooth_ui

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Build smooth-ui
        working-directory: smooth_ui
        run: npm ci && npm run build

      - name: Install and build resources (no CMS)
        env:
          NEXT_PUBLIC_SITE_URL: https://smoothhiring.com
        run: |
          pnpm install --frozen-lockfile
          pnpm build:resources

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: aws s3 sync ./apps/resources/out "s3://${S3_BUCKET}/"

      - name: Invalidate CloudFront (apex)
        continue-on-error: true
        run: |
          aws cloudfront create-invalidation --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" --paths "/resources/*" "/*"
          echo "::warning::If this step failed, grant gh-smoothhiring-resources cloudfront:CreateInvalidation on distribution ${CLOUDFRONT_DISTRIBUTION_ID} (E2O2WRCWTC6KI6)."

  slack-notify:
    needs: deploy
    if: always()
    uses: ./.github/workflows/slack-notify-reusable.yml
    with:
      label: production
      conclusion: ${{ needs.deploy.result }}
    secrets: inherit
