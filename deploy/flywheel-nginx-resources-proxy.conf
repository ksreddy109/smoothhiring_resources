# Paste into Flywheel: Site → Advanced → Nginx configuration (production smoothhiring.com)
# Proxies /resources and /_next to the live resources app on resources.smoothhiring.com.
# Required while some clients still resolve smoothhiring.com to Flywheel (151.101.2.159).
# Safe to keep even when apex DNS points at CloudFront E2O2WRCWTC6KI6.

location = /resources {
    return 301 https://$host/resources/;
}

location ^~ /resources/ {
    proxy_pass https://resources.smoothhiring.com;
    proxy_ssl_server_name on;
    proxy_set_header Host resources.smoothhiring.com;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location ^~ /_next/ {
    proxy_pass https://resources.smoothhiring.com;
    proxy_ssl_server_name on;
    proxy_set_header Host resources.smoothhiring.com;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
