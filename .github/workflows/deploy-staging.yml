name: Deploy staging to S3

on:
  workflow_dispatch:
  push:
    branches:
      - staging

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout resources app
        uses: actions/checkout@v4
        with:
          path: app

      - name: Checkout smooth-ui
        uses: actions/checkout@v4
        with:
          repository: KetSoftware/smooth_ui
          path: smooth_ui

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Build smooth-ui
        working-directory: smooth_ui
        run: npm ci && npm run build

      - name: Install and build Next export
        working-directory: app
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.RESOURCES_STAGING_URL }}
        run: |
          if [ -z "$NEXT_PUBLIC_SITE_URL" ]; then
            echo "Set repository variable RESOURCES_STAGING_URL to the staging site origin (e.g. https://staging-resources.smoothhiring.com)"
            exit 1
          fi
          npm ci && npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to staging bucket
        working-directory: app
        env:
          S3_BUCKET: ${{ vars.S3_STAGING_RESOURCES_BUCKET }}
        run: |
          if [ -z "$S3_BUCKET" ]; then
            echo "Set repository variable S3_STAGING_RESOURCES_BUCKET"
            exit 1
          fi
          aws s3 sync ./out "s3://${S3_BUCKET}/"

      - name: Invalidate CloudFront staging
        if: ${{ vars.CLOUDFRONT_STAGING_DISTRIBUTION_ID != '' }}
        run: |
          aws cloudfront create-invalidation --distribution-id "${{ vars.CLOUDFRONT_STAGING_DISTRIBUTION_ID }}" --paths "/*"
